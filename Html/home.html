<!DOCTYPE html>
<html data-theme="light" lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <!-- Font-Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Favicon Icons -->
  <link rel="shortcut icon" href="../assets/github-logo.png" type="image/x-icon">
  <!-- Output Css link -->
  <link rel="stylesheet" href="../src/output.css">
  <title>GitHub Issues Tracker</title>
</head>

<body>

  <!-- Header Section -->
  <header id="" class="">


    <nav class="border-b border-gray-200">
      <div class="containers flex gap-3 flex-wrap items-center justify-center sm:flex-row sm:justify-between">

        <!-- Logo -->
        <div class="flex gap-2 items-center">
          <img src="../assets/github-logo.png" alt="img" class="w-10">
          <h2 class="font-semibold text-lg">GitHub Issues Tracker</h2>
        </div>

        <!-- Btn  -->

        <div class="flex flex-wrap justify-center items-center gap-3 sm:flex-row">

          <!-- Search input -->
          <div class="flex gap-2 items-center border-gray-300 border py-1 px-2 rounded-lg">
            <img src="../assets/icons/icons.png" alt="img">
            <input id="searchInputValue" type="text" placeholder="Search issues..." class="outline-none">
          </div>


          <div>
            <button onclick="searchIssues()"
              class="flex items-center bg-primary py-2 px-4 rounded-lg gap-2 text-white cursor-pointer max-w-max">
              <!-- <img src="../assats/icons/Plus.png" alt="icons"> -->
              Search
            </button>
          </div>

        </div>

      </div>
    </nav>


  </header>


</body>

</html>
